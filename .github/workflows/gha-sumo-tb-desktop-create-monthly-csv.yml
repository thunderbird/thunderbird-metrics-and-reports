name: gha-sumo-tb-desktop-create-monthly-csv

on:
  workflow_run:
    workflows: ["gha-sumo-tb-desktop-concat-all-questions-answers"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-report:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        python-version: '3.14' # Sets the version uv will use
        enable-cache: true      # Highly recommended for speed
    - name: Install dependencies
      run: uv pip install -r requirements.txt
    - name: Run create monthly csv script
      run: uv run sumo-tb-desktop-create-monthly-csv
    - name: Commit changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add CONCATENATED_FILES/
        git commit -m "Create monthly report CSV" || echo "No changes to commit"
        git push
